
<div class="stock-item-container" >
    <h2 class="stock-title">{{stock.name}}</h2>
    <h3 class="stock-code">({{stock.code}})</h3>
    <span class="stock-start-container"
        [class.vebo] = "stock.isIncrease()"
        [class.xabo] = "!stock.isIncrease()"
    >
        <h3 class="stock-price">${{stock.price}}</h3>
        <span class="stock-detail-container">
            <i class="bi"
                [class.bi-caret-up-fill] = "stock.isIncrease()"
                [class.bi-caret-down-fill] = "!stock.isIncrease()"
            ></i>
            <label for="" class="stock-change">({{stock.chenhLech()}}$)</label>
        </span>
        
    </span>

    <div class="fn-btn">
        <!-- class binding -->
        <button class="btn-icon" (click)="addFavorite(stock)" >
            <i style="color: orange;" class="bi "
            
            [class.bi-star] = "!stock.favourite"
            [class.bi-star-fill] = "stock.favourite"
            ></i>
        </button>

        <button class="btn-icon">
            <i style="color: gray;" class="bi bi-pencil-fill"></i>
        </button>
        <button  class="btn-icon">
            <i style="color: red;" class="bi bi-trash3"></i>
        </button>
        <button  class="btn-icon">
            <i class="bi bi-eye-fill"></i>
        </button>
    </div>

</div>
