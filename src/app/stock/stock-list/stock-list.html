
<div class="search-stock">
    <input [(ngModel)]="searchKeyword" (input)="doSearch()"  type="text" placeholder="Nhập mã hoặc tên stock để tìm kiếm...">
</div>
<div class="stock-list-container">
    <!-- Truyền stockElement từ componet cha sang componet stock items -->
     <div class="stock-favorite">
        <app-stock-item 
            
            *ngFor="let stockElement of stockList|async" 
            
            [stock]="stockElement"
        ></app-stock-item>
     </div>

    <table mat-table [dataSource]="(stockList | async) || []" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
            The actual rendered columns are set as a property on the row definition" -->

    <!-- Position Column -->
    <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef> Code </th>
        <td mat-cell *matCellDef="let element"> {{element.code}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Price </th>
        <td mat-cell *matCellDef="let element"> {{element.price}} </td>
    </ng-container>

    <!-- Symbol Column -->
    <ng-container matColumnDef="preprice">
        <th mat-header-cell *matHeaderCellDef> PreviousPrice </th>
        <td mat-cell *matCellDef="let element"> {{element.previousPrice}} </td>
    </ng-container>
    <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let element">
            <button mat-icon-button aria-label="View Details" (click)="viewDetial(element)">
                <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button aria-label="Favorite" (click)="addFavorite(element)" >
                <mat-icon>star</mat-icon>
            </button>
            <button mat-icon-button aria-label="Edit" (click)="modifyStock(element)">
                <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button aria-label="Delete" (click)="deleteStock(element)">
                <mat-icon>delete</mat-icon>
            </button>

        </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>


</div>
<router-outlet></router-outlet>
