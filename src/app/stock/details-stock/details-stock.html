<div class="overlay" ></div>

<div  class="view-detial-container">
    <h1>Chi tiết Stock</h1>
    <button (click)="closeDialog()" class="btn-close"><i class="bi bi-x"></i></button>
    <table  class="table">
        <tbody>
        <tr >
            <th class="table-primary" >Code:</th>
            <td>{{(stockSelect| async)?.code}}</td>
        </tr>
        <tr >
            <th class="table-primary">Namee:</th>
            <td>{{(stockSelect| async)?.name}}</td>
        </tr>       
        <tr >
            <th class="table-primary">Previous Price:</th>
            <td>{{(stockSelect| async)?.previousPrice}}</td>
        </tr>
        <tr >
            <th class="table-primary">Current Price:</th>
            <td>{{(stockSelect| async)?.price}}</td>
        </tr>
        <tr >
            <th class="table-primary">Exchange:</th>
            <td>{{(stockSelect| async)?.exchange}}</td>
        </tr>
                <tr >
            <th class="table-primary">Favorite:</th>
            <td>{{(stockSelect| async)?.favorite}}</td>
        </tr>
        </tbody>
    </table>
</div>
