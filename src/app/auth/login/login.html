<div class="login-container">

  <form [formGroup]="loginFrm" (ngSubmit)="doLogin()" class="login-form">

    <h1 class="title-login">Đăng nhập</h1>

    <!-- Username -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tên đăng nhập</mat-label>
      <input matInput formControlName="txtUsername" />

      <mat-error *ngIf="loginFrm.get('txtUsername')?.hasError('required')">
        Required
      </mat-error>
    </mat-form-field>

    <!-- Password -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Mật khẩu</mat-label>
      <input matInput type="password" formControlName="txtPassword" />

      <mat-error *ngIf="loginFrm.get('txtPassword')?.hasError('required')">
        Required
      </mat-error>
    </mat-form-field>

    <!-- Button -->
    <button  mat-flat-button color="accent" type="submit">
        <mat-icon>login</mat-icon>
        Đăng nhập
    </button>

    <button mat-button routerLink="/auth/regist" type="button">
      Đăng ký
    </button>

  </form>

</div>
